<!DOCTYPE html>
<html>

<head>
  <title>Emotion Music Recommendation</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Bigelow+Rules&display=swap" rel="stylesheet">

  <!-- Your CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

  <div id="body">

    <!-- Logout -->
    <a href="/logout" class="logout-btn">Logout</a>

    <!-- Title -->
    <h1 align="center">Mood Music Recommender</h1>

    <div class="main-container">

      <!-- LEFT SIDE (Camera) -->
      <div class="left-panel">
        <h2>Emotion Detector</h2>
        <div class="outer-shadow">
          <video id="video" class="img-fluid" autoplay></video>
        </div>
        <h4 id="emotionText" class="mt-3 text-success"></h4>
      </div>

      <!-- RIGHT SIDE (Songs) -->
      <div class="right-panel">
        <h2>Song Recommendations</h2>
        <div class="outer-shadow" id="ResultArea"></div>
      </div>

    </div>

  </div>

  <!-- jQuery -->
  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>

  <script>

    const video = document.getElementById('video');
    const emotionText = document.getElementById('emotionText');

    // Start Browser Camera
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        alert("Camera access denied!");
      });

    // Detect emotion every 2 seconds
    setInterval(function () {

      if (video.videoWidth === 0) return;

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      const imageData = canvas.toDataURL('image/jpeg');

      fetch('/detect_emotion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageData })
      })
      .then(res => res.json())
      .then(data => {

        // Show detected emotion
        emotionText.innerText = "Detected Emotion: " + data.emotion;

        // Update songs
        $.getJSON('/t', function (songData) {
          CreateHtmlTable(songData);
        });

      });

    }, 2000); // 2 seconds


    function CreateHtmlTable(data) {

      $("#ResultArea").html("");

      var table = $("<table class='table table-striped table-light table-bordered table-hover table-sm'></table>").appendTo("#ResultArea");

      var rowHeader = $("<tr></tr>").appendTo(table);
      $("<td><b>Name</b></td>").appendTo(rowHeader);
      $("<td><b>Album</b></td>").appendTo(rowHeader);
      $("<td><b>Artist</b></td>").appendTo(rowHeader);

      $.each(data, function (i, value) {

        var row = $("<tr></tr>").appendTo(table);
        $("<td></td>").text(value.Name).appendTo(row);
        $("<td></td>").text(value.Album).appendTo(row);
        $("<td></td>").text(value.Artist).appendTo(row);

      });
    }

  </script>

</body>
</html>
